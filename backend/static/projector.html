<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📺 Quiz Projector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .projector-container {
            max-width: 1200px;
            width: 100%;
            background: #2d2d2d;
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border-top: 8px solid #cc0000;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #cc0000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header h1 { color: #cc0000; font-size: 2.5rem; font-weight: 700; }
        .round-badge {
            background: #cc0000;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .question-area {
            background: #3a3a3a;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            min-height: 200px;
        }
        .question-text { font-size: 2.8rem; line-height: 1.5; margin-bottom: 30px; font-weight: 500; }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .option-item {
            background: #4a4a4a;
            padding: 20px 25px;
            border-radius: 12px;
            font-size: 2rem;
            border-left: 8px solid #666;
        }
        .option-item .letter { font-weight: bold; color: #cc0000; margin-right: 15px; }
        .current-school {
            background: #cc0000;
            padding: 15px 30px;
            border-radius: 12px;
            display: inline-block;
            font-size: 2.2rem;
            font-weight: bold;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .scores-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #444;
        }
        .score-chip {
            background: #3a3a3a;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.4rem;
            border: 2px solid transparent;
        }
        .score-chip.active-school { border-color: #cc0000; background: #4a1a1a; }
        .score-chip .pts { font-weight: bold; color: #ffc107; margin-left: 10px; }
        .status-dead { color: #ff6b6b; font-size: 2rem; font-weight: bold; margin-top: 15px; }
        .refresh-btn {
            background: #cc0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .footer { margin-top: 30px; text-align: center; color: #888; font-size: 1rem; }
        .debug-info { color: #666; font-size: 0.8rem; margin-top: 10px; text-align: center; }
        @media (max-width: 768px) {
            .projector-container { padding: 20px; }
            .question-text { font-size: 2rem; }
            .options-grid { grid-template-columns: 1fr; }
            .option-item { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="projector-container">
    <div class="header">
        <h1>🏆 Megatek ICT Quiz</h1>
        <div style="display:flex; gap:15px; align-items:center;">
            <button onclick="fetchState()" class="refresh-btn">🔄 Refresh</button>
            <div class="round-badge" id="roundName">Waiting...</div>
        </div>
    </div>

    <div class="question-area">
        <div class="question-text" id="questionText">Load a question to begin</div>
        <div class="options-grid" id="optionsContainer">
            <div style="grid-column:span 2; text-align:center; color:#888; font-size:1.5rem;">No options loaded</div>
        </div>
        <div id="turnIndicator">
            <div class="current-school" id="currentSchool">No turn</div>
        </div>
        <div id="deadIndicator" style="display:none;" class="status-dead">💀 QUESTION DEAD</div>
    </div>

    <div class="scores-container" id="scoresContainer">
        <div style="color:#888; font-size:1.2rem;">No schools in this round</div>
    </div>
    <div class="footer">📡 Live feed • Auto‑updates every 2 seconds</div>
    <div class="debug-info" id="debugInfo">Last updated: N/A</div>
</div>

<script>
    let lastState = null;

    async function fetchState() {
        try {
            const res = await fetch('/api/state');
            const state = await res.json();
            
            // Check if state actually changed
            const stateStr = JSON.stringify(state);
            if (stateStr === lastState) return;
            lastState = stateStr;

            // Update round
            document.getElementById('roundName').textContent = state.round_name || 'No Round';

            // Update question
            document.getElementById('questionText').textContent = state.question_text || 'No question loaded';

            // Update options
            const optionsContainer = document.getElementById('optionsContainer');
            const letters = ['A', 'B', 'C', 'D'];
            if (state.options && state.options.length) {
                let html = '';
                state.options.forEach((opt, i) => {
                    html += `<div class="option-item"><span class="letter">${letters[i]}.</span> ${opt}</div>`;
                });
                optionsContainer.innerHTML = html;
            } else {
                optionsContainer.innerHTML = '<div style="grid-column:span 2; text-align:center; color:#888; font-size:1.5rem;">No options loaded</div>';
            }

            // Update current school
            const turnEl = document.getElementById('currentSchool');
            const deadEl = document.getElementById('deadIndicator');
            if (state.is_dead) {
                deadEl.style.display = 'block';
                turnEl.style.display = 'none';
            } else if (state.current_school) {
                deadEl.style.display = 'none';
                turnEl.textContent = `🎯 ${state.current_school.name} (Turn)`;
                turnEl.style.display = 'inline-block';
            } else {
                deadEl.style.display = 'none';
                turnEl.textContent = 'No active turn';
                turnEl.style.display = 'inline-block';
            }

            // Update scores
            const scoresContainer = document.getElementById('scoresContainer');
            if (state.schools && state.schools.length) {
                let html = '';
                state.schools.forEach(school => {
                    const pts = state.scores[school.id] || 0;
                    const isActive = (state.current_school && state.current_school.id === school.id && !state.is_dead);
                    html += `<div class="score-chip ${isActive ? 'active-school' : ''}">
                        ${school.name} <span class="pts">${pts} pts</span>
                    </div>`;
                });
                scoresContainer.innerHTML = html;
            } else {
                scoresContainer.innerHTML = '<div style="color:#888; font-size:1.2rem;">No schools in this round</div>';
            }

            document.getElementById('debugInfo').textContent = `Last updated: ${state.timestamp || 'N/A'}`;

        } catch (err) {
            console.error('Error fetching state:', err);
        }
    }

    // Poll every 2 seconds
    fetchState();
    setInterval(fetchState, 2000);
</script>
</body>
</html>
