<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📺 Quiz Projector</title>
    <style>
        /* ---------- FULLSCREEN RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;   /* no scrollbars ever */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
        }

        /* ---------- CONTAINER FILLS EXACT VIEWPORT ---------- */
        .projector-container {
            width: 100vw;
            height: 100vh;
            background: #2d2d2d;
            display: flex;
            flex-direction: column;
            padding: 1.5vh 2vw;
            border-top: 6px solid #cc0000;
            box-sizing: border-box;
            overflow: hidden;   /* prevent any child overflow */
        }

        /* ---------- HEADER (always compact) ---------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #cc0000;
            padding-bottom: 0.8vh;
            margin-bottom: 1.2vh;
            flex-shrink: 0;
            height: 8vh; /* fixed height */
        }
        .header h1 {
            color: #cc0000;
            font-size: 3.2vh;
            font-weight: 700;
            line-height: 1.2;
        }
        .round-badge {
            background: #cc0000;
            padding: 0.5vh 2vw;
            border-radius: 50px;
            font-size: 2.4vh;
            font-weight: bold;
        }
        .refresh-btn {
            background: #cc0000;
            color: white;
            border: none;
            padding: 0.5vh 1.5vw;
            border-radius: 6px;
            cursor: pointer;
            font-size: 2vh;
        }

        /* ---------- QUESTION AREA (flex-grow, no overflow) ---------- */
        .question-area {
            flex: 1;
            background: #3a3a3a;
            border-radius: 16px;
            padding: 1.5vh 2vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;   /* flex override */
            overflow: hidden;
        }

        .question-text {
            font-size: 3.6vh;
            line-height: 1.3;
            font-weight: 500;
            margin-bottom: 1.2vh;
            flex-shrink: 0;
            /* If text is too long, we truncate with ellipsis (but better to keep full) */
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        /* ---------- OPTIONS GRID (2 columns, compact) ---------- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8vh 2vw;
            flex-shrink: 0;
        }
        .option-item {
            background: #4a4a4a;
            padding: 0.8vh 1vw;
            border-radius: 10px;
            font-size: 2.4vh;
            border-left: 6px solid #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .option-item .letter {
            font-weight: bold;
            color: #cc0000;
            margin-right: 10px;
        }

        /* ---------- CURRENT SCHOOL (pulsing) ---------- */
        .current-school {
            background: #cc0000;
            padding: 0.6vh 1.5vw;
            border-radius: 10px;
            display: inline-block;
            font-size: 2.8vh;
            font-weight: bold;
            margin-top: 1vh;
            flex-shrink: 0;
            animation: pulse 1.5s infinite;
            align-self: flex-start;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .status-dead {
            color: #ff6b6b;
            font-size: 3vh;
            font-weight: bold;
            margin-top: 1vh;
            flex-shrink: 0;
        }

        /* ---------- SCORES (fixed height, wrap) ---------- */
        .scores-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6vh 1vw;
            margin-top: 1.2vh;
            padding-top: 1vh;
            border-top: 2px solid #444;
            flex-shrink: 0;
            height: 10vh;   /* fixed height so it doesn't grow */
            overflow: hidden;
            align-content: flex-start;
        }
        .score-chip {
            background: #3a3a3a;
            padding: 0.4vh 1vw;
            border-radius: 50px;
            font-size: 2vh;
            border: 2px solid transparent;
            white-space: nowrap;
        }
        .score-chip.active-school {
            border-color: #cc0000;
            background: #4a1a1a;
        }
        .score-chip .pts {
            font-weight: bold;
            color: #ffc107;
            margin-left: 6px;
        }

        /* ---------- FOOTER (tiny) ---------- */
        .footer {
            margin-top: 0.5vh;
            text-align: center;
            color: #666;
            font-size: 1.6vh;
            flex-shrink: 0;
        }
        .debug-info {
            color: #444;
            font-size: 1.4vh;
            text-align: center;
            flex-shrink: 0;
        }

        /* ---------- RESPONSIVE (smaller screens) ---------- */
        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
                gap: 0.6vh;
            }
            .option-item {
                font-size: 2vh;
                padding: 0.5vh 1.5vw;
                white-space: normal;
                line-height: 1.3;
            }
            .header h1 { font-size: 2.4vh; }
            .round-badge { font-size: 1.8vh; padding: 0.3vh 2vw; }
            .refresh-btn { font-size: 1.6vh; }
            .question-text { font-size: 2.8vh; }
            .current-school { font-size: 2vh; }
            .score-chip { font-size: 1.6vh; }
            .scores-container { height: 12vh; }
        }
        @media (max-height: 500px) {
            .header h1 { font-size: 2vh; }
            .round-badge { font-size: 1.6vh; }
            .question-text { font-size: 2.4vh; }
            .option-item { font-size: 1.8vh; }
            .current-school { font-size: 2vh; }
            .score-chip { font-size: 1.4vh; }
            .scores-container { height: 8vh; }
        }
    </style>
</head>
<body>
<div class="projector-container">
    <!-- HEADER -->
    <div class="header">
        <h1>🏆 Megatek ICT Quiz</h1>
        <div style="display:flex; gap:1vw; align-items:center;">
            <button onclick="fetchState()" class="refresh-btn">🔄 Refresh</button>
            <div class="round-badge" id="roundName">Waiting...</div>
        </div>
    </div>

    <!-- QUESTION AREA -->
    <div class="question-area">
        <div class="question-text" id="questionText">Load a question to begin</div>
        <div class="options-grid" id="optionsContainer">
            <div style="grid-column:span 2; text-align:center; color:#888; font-size:2vh;">No options loaded</div>
        </div>
        <div id="turnIndicator">
            <div class="current-school" id="currentSchool">No turn</div>
        </div>
        <div id="deadIndicator" style="display:none;" class="status-dead">💀 QUESTION DEAD</div>
    </div>

    <!-- SCORES -->
    <div class="scores-container" id="scoresContainer">
        <div style="color:#888; font-size:1.8vh;">No schools in this round</div>
    </div>

    <!-- FOOTER -->
    <div class="footer">📡 Live feed • Auto‑updates every 2 seconds</div>
    <div class="debug-info" id="debugInfo">Last updated: N/A</div>
</div>

<script>
    let lastState = null;

    async function fetchState() {
        try {
            const res = await fetch('/api/state');
            const state = await res.json();
            const stateStr = JSON.stringify(state);
            if (stateStr === lastState) return;
            lastState = stateStr;

            // Round
            document.getElementById('roundName').textContent = state.round_name || 'No Round';

            // Question
            document.getElementById('questionText').textContent = state.question_text || 'No question loaded';

            // Options
            const optionsContainer = document.getElementById('optionsContainer');
            const letters = ['A', 'B', 'C', 'D'];
            if (state.options && state.options.length) {
                let html = '';
                state.options.forEach((opt, i) => {
                    html += `<div class="option-item"><span class="letter">${letters[i]}.</span> ${opt}</div>`;
                });
                optionsContainer.innerHTML = html;
            } else {
                optionsContainer.innerHTML = '<div style="grid-column:span 2; text-align:center; color:#888; font-size:2vh;">No options loaded</div>';
            }

            // Turn / Dead
            const turnEl = document.getElementById('currentSchool');
            const deadEl = document.getElementById('deadIndicator');
            if (state.is_dead) {
                deadEl.style.display = 'block';
                turnEl.style.display = 'none';
            } else if (state.current_school) {
                deadEl.style.display = 'none';
                turnEl.textContent = `🎯 ${state.current_school.name} (Turn)`;
                turnEl.style.display = 'inline-block';
            } else {
                deadEl.style.display = 'none';
                turnEl.textContent = 'No active turn';
                turnEl.style.display = 'inline-block';
            }

            // Scores
            const scoresContainer = document.getElementById('scoresContainer');
            if (state.schools && state.schools.length) {
                let html = '';
                state.schools.forEach(school => {
                    const pts = state.scores[school.id] || 0;
                    const isActive = (state.current_school && state.current_school.id === school.id && !state.is_dead);
                    html += `<div class="score-chip ${isActive ? 'active-school' : ''}">
                        ${school.name} <span class="pts">${pts}</span>
                    </div>`;
                });
                scoresContainer.innerHTML = html;
            } else {
                scoresContainer.innerHTML = '<div style="color:#888; font-size:1.8vh;">No schools in this round</div>';
            }

            document.getElementById('debugInfo').textContent = `Last updated: ${state.timestamp || 'N/A'}`;

        } catch (err) {
            console.error('Error fetching state:', err);
        }
    }

    fetchState();
    setInterval(fetchState, 2000);
</script>
</body>
</html>
