<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📺 Quiz – Questions Only</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #000000;
        }
        .projector-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4vh 6vw;
            background: #ffffff;
        }
        .question-text {
            font-size: 5.5vh;
            line-height: 1.4;
            font-weight: 600;
            margin-bottom: 5vh;
            text-align: center;
            width: 100%;
            max-width: 1100px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5vh 4vw;
            width: 100%;
            max-width: 1000px;
        }
        .option-item {
            background: #f5f5f5;
            padding: 1.8vh 2vw;
            border-radius: 12px;
            font-size: 3.4vh;
            border-left: 8px solid #cc0000;
            text-align: left;
        }
        .option-item .letter {
            font-weight: bold;
            color: #cc0000;
            margin-right: 15px;
        }
        .refresh-btn {
            position: absolute;
            bottom: 2vh;
            right: 2vw;
            background: #cc0000;
            color: white;
            border: none;
            padding: 0.6vh 1.5vw;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.8vh;
            opacity: 0.3;
        }
        .refresh-btn:hover { opacity: 1; }
        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 4vh; }
            .option-item { font-size: 2.4vh; }
        }
    </style>
</head>
<body>
<div class="projector-container">
    <div class="question-text" id="questionText">Load a question</div>
    <div class="options-grid" id="optionsContainer">
        <div style="grid-column:span 2; text-align:center; color:#999; font-size:2.5vh;">No options</div>
    </div>
    <button onclick="fetchState()" class="refresh-btn">↻</button>
</div>

<script>
    let lastState = null;

    async function fetchState() {
        try {
            const res = await fetch('/api/state');
            const state = await res.json();
            const stateStr = JSON.stringify(state);
            if (stateStr === lastState) return;
            lastState = stateStr;

            document.getElementById('questionText').textContent = state.question_text || 'No question';

            const container = document.getElementById('optionsContainer');
            const letters = ['A', 'B', 'C', 'D'];
            if (state.options && state.options.length) {
                let html = '';
                state.options.forEach((opt, i) => {
                    html += `<div class="option-item"><span class="letter">${letters[i]}.</span> ${opt}</div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="grid-column:span 2; text-align:center; color:#999; font-size:2.5vh;">No options</div>';
            }
        } catch (err) { console.error(err); }
    }

    fetchState();
    setInterval(fetchState, 2000);
</script>
</body>
</html>
