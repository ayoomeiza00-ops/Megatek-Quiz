<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megatek ICT Quiz</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="/static/megatek_logo.png" alt="Megatek ICT Academy" class="logo">
            <h1>ICT Quiz Competition</h1>
        </header>

        <!-- Start Screen -->
        <div id="start-screen">
            <p>Welcome! You will answer 150 multiple‑choice questions.</p>
            <p>Rounds 1–3: <strong>15 seconds</strong> per question.</p>
            <p>Rounds 4–5: <strong>10 seconds</strong> per question.</p>
            <button id="start-btn" class="btn-red">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" style="display:none;">
            <div class="quiz-header">
                <span id="round-info">Round 1</span>
                <span id="question-counter">1 / 150</span>
                <span id="timer-display">⏱ 15s</span>
            </div>
            <div id="question-area">
                <p id="question-text"></p>
                <div id="options-container"></div>
            </div>
            <button id="next-btn" class="btn-red" disabled>Next</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" style="display:none;">
            <h2>Quiz Complete!</h2>
            <p>Your score: <span id="final-score">0</span> / 150</p>
            <p>Share your result with your boss:</p>
            <input type="text" id="result-link" readonly>
            <button id="copy-btn" class="btn-red">Copy Link</button>
            <br><br>
            <a href="/" class="btn-red">Home</a>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
